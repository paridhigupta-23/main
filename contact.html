<!-- HEADER -->
<div class="container text-center my-5">
  <h1>Contact Us</h1>

</div>

<div class="container">
  <div class="row">

    <!-- CONTACT FORM -->
    <div class="col-md-6">
      <form class="shadow p-4 bg-light rounded">

        <input type="text" class="form-control mb-3" placeholder="Your Name" required>
        <input type="email" class="form-control mb-3" placeholder="Your Email" required>

        <textarea class="form-control mb-3" placeholder="Your Message"></textarea>

        <button class="btn btn-primary w-100">Send Message</button>
      </form>
    </div>

    <!-- CONTACT INFO -->
    <div class="col-md-6">
      <div class="p-4">

  </div>

<script>
function toggleTheme(){
  document.body.classList.toggle("dark");

  // Save preference
  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
  } else {
    localStorage.setItem("theme","light");
  }
}

// Load saved theme
window.onload = function(){
  if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
  }
}

</script>
