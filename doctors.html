<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Doctors</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f7fa;
}

.doctor-card{
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.doctor-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card img{
  height:220px;
  object-fit:cover;
}

.badge{
  font-size:0.9rem;
}
/* DARK MODE */
.dark{
  background:#121212;
  color:white;
}

/* Navbar */
.dark .navbar{
  background:#1f1f1f !important;
}

/* Cards */
.dark .card{
  background:#1e1e1e;
  color:white;
}

/* Sections */
.dark section{
  background:#121212;
}

/* Footer */
.dark footer{
  background:#1f1f1f;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">

  <a class="navbar-brand d-flex align-items-center gap-2" href="#" >
    <img src="logo.jpg" width="40" height="40">
    <span class="fw-bold">KIVI</span>
  </a>

  <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse justify-content-center" id="nav">
    <ul class="navbar-nav gap-3">
      <li><a class="nav-link active" href="index.html">Home</a></li>
      <li><a class="nav-link" href="diseases.html">Diseases</a></li>
      <li><a class="nav-link" href="doctors.html">Doctors</a></li>
      <li><a class="nav-link" href="appointment.html">Appointment</a></li>
      <li><a class="nav-link" href="contact.html">Contact</a></li>
      <li><a class="nav-link" href="about.html">About</a></li>
    </ul>
     <button onclick="toggleTheme()" class="btn btn-light ms-auto">
  🌙
    </button>

  </div>

</nav>
<!-- HEADER -->
<div class="container text-center my-4">
  <h1>Meet Our Doctors</h1>
  <p class="text-muted">Find the best specialists</p>
</div>

<!-- SEARCH -->
<div class="container mb-3">
  <input type="text" id="search" onkeyup="searchDoctors()" 
    class="form-control" placeholder="Search by name or specialization...">
</div>

<!-- FILTER BUTTONS -->
<div class="text-center mb-4">
  <button class="btn btn-outline-primary" onclick="filterDoctor('All')">All</button>
  <button class="btn btn-outline-primary" onclick="filterDoctor('Cardiologist')">Cardiology</button>
  <button class="btn btn-outline-primary" onclick="filterDoctor('Neurologist')">Neurology</button>
  <button class="btn btn-outline-primary" onclick="filterDoctor('Dermatologist')">Dermatology</button>
</div>

<!-- DOCTOR LIST -->
<div class="container">
  <div class="row" id="doctorList"></div>
</div>

<!-- MODAL -->
<div class="modal fade" id="doctorModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h4 id="docName"></h4>
      <p id="docSpec"></p>
      <p id="docExp"></p>
      <p id="docAvail"></p>
      <p id="docRating"></p>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

// DOCTOR DATA
const doctors = [
  {name:"Dr. Sharma", spec:"Cardiologist", exp:"10 yrs", available:"Mon-Fri", rating:4.8, img:"https://randomuser.me/api/portraits/men/1.jpg"},
  {name:"Dr. Mehta", spec:"Neurologist", exp:"8 yrs", available:"Tue-Sat", rating:4.7, img:"https://randomuser.me/api/portraits/women/2.jpg"},
  {name:"Dr. Reddy", spec:"Dermatologist", exp:"6 yrs", available:"Mon-Sat", rating:4.6, img:"https://randomuser.me/api/portraits/women/3.jpg"},
  {name:"Dr. Khan", spec:"Orthopedic", exp:"12 yrs", available:"Mon-Fri", rating:4.9, img:"https://randomuser.me/api/portraits/men/4.jpg"},
  {name:"Dr. Patel", spec:"Pediatrician", exp:"7 yrs", available:"All Days", rating:4.5, img:"https://randomuser.me/api/portraits/women/5.jpg"}
];

// DISPLAY DOCTORS
function displayDoctors(data){
  let list = document.getElementById("doctorList");
  list.innerHTML = "";

  data.forEach(d => {
    list.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card doctor-card shadow h-100">
          
          <img src="${d.img}" class="card-img-top">

          <div class="card-body text-center">
            <h5>${d.name}</h5>

            <span class="badge bg-primary mb-2">${d.spec}</span>

            <p>⭐ ${d.rating}</p>
            <p><b>Experience:</b> ${d.exp}</p>
            <p><b>Available:</b> ${d.available}</p>

            <button class="btn btn-outline-primary btn-sm"
              onclick="viewProfile('${d.name}','${d.spec}','${d.exp}','${d.available}','${d.rating}')">
              View Profile
            </button>

            <button class="btn btn-success btn-sm mt-2"
              onclick="book('${d.spec}')">
              Book Appointment
            </button>

          </div>
        </div>
      </div>
    `;
  });
}

// SEARCH
function searchDoctors(){
  let input = document.getElementById("search").value.toLowerCase();

  let filtered = doctors.filter(d =>
    d.name.toLowerCase().includes(input) ||
    d.spec.toLowerCase().includes(input)
  );

  displayDoctors(filtered);
}

// FILTER
function filterDoctor(type){
  if(type === "All"){
    displayDoctors(doctors);
  } else {
    let filtered = doctors.filter(d => d.spec === type);
    displayDoctors(filtered);
  }
}

// MODAL
function viewProfile(name, spec, exp, avail, rating){
  document.getElementById("docName").innerText = name;
  document.getElementById("docSpec").innerText = "Specialization: " + spec;
  document.getElementById("docExp").innerText = "Experience: " + exp;
  document.getElementById("docAvail").innerText = "Available: " + avail;
  document.getElementById("docRating").innerText = "Rating: " + rating;

  let modal = new bootstrap.Modal(document.getElementById("doctorModal"));
  modal.show();
}

// BOOK BUTTON
function book(spec){
  localStorage.setItem("selectedDoctor", spec);
  window.location.href = "appointment.html";
}

// INITIAL LOAD
displayDoctors(doctors);
</script>
<script>
function toggleTheme(){
  document.body.classList.toggle("dark");

  // Save preference
  if(document.body.classList.contains("dark")){
    localStorage.setItem("theme","dark");
  } else {
    localStorage.setItem("theme","light");
  }
}

// Load saved theme
window.onload = function(){
  if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
  }
}
</script>

</body>
</html>
